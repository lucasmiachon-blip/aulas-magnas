<!DOCTYPE html>
<html lang="pt-BR" class="no-js">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cirrose — Plano C</title>
</head>
<body class="stage-c">
<div class="reveal">
  <div class="case-panel hidden" id="case-panel" data-severity="neutral">
    <div class="panel-header">
      <div class="panel-dot"></div>
      <span class="panel-name">Antônio, 55a</span>
    </div>
    <div class="panel-fields"></div>
    <div class="panel-events"></div>
    <div class="panel-calc" id="panel-fib4"></div>
  </div>

  <div class="slides">
%%SLIDES%%
  </div>
</div>
<script type="module">
  import Reveal from 'reveal.js';
  import Notes from 'reveal.js/plugin/notes/notes.esm.js';
  import gsap from 'gsap';
  import { SplitText } from 'gsap/SplitText';
  import { Flip } from 'gsap/Flip';
  gsap.registerPlugin(SplitText, Flip);
  import 'reveal.js/dist/reveal.css';
  import '../../shared/css/base.css';
  import './cirrose.css';
  import './archetypes.css';
  import { initAula, createAnimationDispatcher } from '../../shared/js/engine.js';
  import { ClickReveal } from '../../shared/js/click-reveal.js';
  import { CasePanel } from '../../shared/js/case-panel.js';
  import { MeldCalc } from '../../shared/js/interactions/meld-calc.js';
  import { Fib4Calc } from '../../shared/js/interactions/fib4-calc.js';
  import { wireAll } from './slide-registry.js';

  const deck = await initAula(Reveal, gsap, { plugins: [Notes], width: 1280, height: 720 });
  window.Reveal = Reveal;
  const anim = createAnimationDispatcher(Reveal, gsap);
  wireAll(Reveal, gsap, { anim, CasePanel, ClickReveal, MeldCalc, Fib4Calc });
  anim.connect();
</script>
</body>
</html>
